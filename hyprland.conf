# ────────────────────────────────────────────────────────────
# Omarchy Custom Theme for Hyprland
# Generated with Omarchist
# ────────────────────────────────────────────────────────────

general {
    col.active_border = rgba(8FECD5ee) rgba(8FECD5ee) rgba(8FECD5ee) rgba(8FECD5ee) rgba(8FECD5ee) rgba(0a0a0aee) rgba(0a0a0aee) rgba(0a0a0aee) 90deg
    col.inactive_border = rgb(272b30)
    border_size = 2
    gaps_in = 3
    gaps_out = 3
}

group {
    col.border_active = rgba(ADF0E9dd)
    col.border_inactive = rgb(485362)
}


decoration {
    rounding = 1
    rounding_power = 3
      shadow {
      enabled = yes
      render_power = 6
      range = 20
      color = rgba(00000052)
      }
  blur {
    enabled = true
    size = 3
    passes = 2
  }
}

windowrule = match:class ^(vesktop|Vesktop)$, opacity 1.0 override, no_dim on
windowrule = match:class ^(code|VSCode|VSCodium)$, opacity 1.0 override, no_dim on
windowrule = match:class ^(chromium|Chromium|google-chrome|Brave|brave-browser)$, opacity 1.0 override, no_dim on